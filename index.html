<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Healthcare Support Web App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f9f9;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    form {
      max-width: 500px;
      margin: 20px auto;
      padding: 20px;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      margin-top: 15px;
      padding: 10px 15px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #219150;
    }
    .chatbot {
      max-width: 500px;
      margin: 30px auto;
      padding: 20px;
      background: #eaf6f6;
      border-radius: 8px;
    }
    .chatbot h2 {
      margin-top: 0;
    }
    .faq {
      margin-top: 10px;
    }
    .faq button {
      background: #3498db;
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <h1>Healthcare Support Portal</h1>

  <!-- Registration / Contact Form -->
  <form>
    <h2>Patient / Volunteer Registration</h2>
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" required>

    <label for="role">I am a:</label>
    <select id="role" name="role" required>
      <option value="patient">Patient</option>
      <option value="volunteer">Volunteer</option>
    </select>

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required>

    <label for="message">Message / Support Needed</label>
    <textarea id="message" name="message" rows="4"></textarea>

    <button type="submit">Submit</button>
  </form>

  <!-- Simple Chatbot Concept -->
  <div class="chatbot">
    <h2>AI FAQ Chatbot (Concept)</h2>
    <p>Click a question to see an automated response:</p>
    <div class="faq">
      <button onclick="showAnswer('support')">What kind of support is available?</button>
      <button onclick="showAnswer('volunteer')">How can I volunteer?</button>
      <button onclick="showAnswer('contact')">How do I contact the NGO?</button>
    </div>
    <p id="answer" style="margin-top:15px; font-style:italic;"></p>
  </div>

  <script>
    function showAnswer(type) {
      let response = "";
      if(type === "support") {
        response = "We provide medical guidance, emotional support, and connect patients with local healthcare volunteers.";
      } else if(type === "volunteer") {
        response = "You can register using the form above. Our team will reach out with opportunities to help patients.";
      } else if(type === "contact") {
        response = "You can email us at support@healthngo.org or call our helpline at +91-12345-67890.";
      }
      document.getElementById("answer").innerText = response;
    }
  </script>
</body>
</html>
